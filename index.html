<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQ Game: Путь Нурса</title>
    <link rel="stylesheet" href="style.css">
    <!-- mongodb+srv://nurs_itcodding:<db_password>@eq-game.zyivfpq.mongodb.net/?appName=EQ-game -->
</head>
<body>
    <div id="game-container">
        
        <div id="results-overlay" class="hidden">
            <div class="results-container">
                <h2>Проект сдан! Результаты EQ</h2>
                <div class="results-grid">
                    <div class="res-col">
                        <h3>Топ осознанных (AITU)</h3>
                        <ul id="leaderboard-list"></ul>
                    </div>
                    <div class="res-col">
                        <h3>Советы от студентов</h3>
                        <div id="comments-box"></div>
                        <input type="text" id="c-name" placeholder="Имя">
                        <textarea id="c-text" placeholder="Твой совет..."></textarea>
                        <button onclick="handleCommentSubmit()">Оставить след</button>
                    </div>
                </div>
                <button class="choice-btn" onclick="location.reload()">Играть снова</button>
            </div>
        </div>

        <div id="background"></div>
        
        <div id="character-layer">
            <img id="character" src="" alt="Спрайт персонажа">
        </div>

        <div id="side-ui">
            <h3>Состояние</h3>
            <div class="stat-container">
                <span>Stress</span>
                <div class="bar-bg"><div id="bar-stress" class="bar-fill" style="background: #ff4757;"></div></div>
            </div>
            <div class="stat-container">
                <span>Awareness</span>
                <div class="bar-bg"><div id="bar-awareness" class="bar-fill" style="background: #2ed573;"></div></div>
            </div>
            <div class="stat-container">
                <span>Empathy</span>
                <div class="bar-bg"><div id="bar-empathy" class="bar-fill" style="background: #1e90ff;"></div></div>
            </div>
            <div class="stat-container">
                <span>Motivation</span>
                <div class="bar-bg"><div id="bar-motivation" class="bar-fill" style="background: #ffa502;"></div></div>
            </div>
        </div>

        <div id="dialogue-box">
            <div id="speaker-name">Нурс</div>
            <div id="dialogue-text">Текст загружается...</div>
            <div id="choices-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
