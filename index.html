<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQ Game: Путь Нурса</title>
    <link rel="stylesheet" href="style.css">
    <!-- mongodb+srv://nurs_itcodding:<db_password>@eq-game.zyivfpq.mongodb.net/?appName=EQ-game -->
</head>
<body>
    <div id="game-container">
        <div id="results-overlay" class="hidden">
            <div class="results-content">
                <h2 id="final-title">Проект сдан!</h2>
                <div class="results-grid">
                    <div class="results-column">
                        <h3>Глобальный выбор</h3>
                        <div id="stats-bars">
                            </div>
                        <h3>Топ-5 осознанных студентов</h3>
                        <ol id="leaderboard-list"></ol>
                    </div>
                    <div class="results-column">
                        <h3>Советы от выживших</h3>
                        <div id="comments-display"></div>
                        <div class="comment-input-area">
                            <input type="text" id="player-name-input" placeholder="Твоё имя">
                            <textarea id="comment-text-input" placeholder="Твой совет..."></textarea>
                            <button onclick="handleCommentSubmit()">Отправить</button>
                        </div>
                    </div>
                </div>
                <button class="choice-btn restart-btn" onclick="location.reload()">В начало</button>
            </div>
        </div>
        <div id="background"></div>
        
        <div id="character-layer">
            <img id="character" src="" alt="Спрайт персонажа">
        </div>

        <div id="side-ui">
            <h3>Состояние</h3>
            <div class="stat-container">
                <span>Stress</span>
                <div class="bar-bg"><div id="bar-stress" class="bar-fill" style="background: #ff4757;"></div></div>
            </div>
            <div class="stat-container">
                <span>Awareness</span>
                <div class="bar-bg"><div id="bar-awareness" class="bar-fill" style="background: #2ed573;"></div></div>
            </div>
            <div class="stat-container">
                <span>Empathy</span>
                <div class="bar-bg"><div id="bar-empathy" class="bar-fill" style="background: #1e90ff;"></div></div>
            </div>
            <div class="stat-container">
                <span>Motivation</span>
                <div class="bar-bg"><div id="bar-motivation" class="bar-fill" style="background: #ffa502;"></div></div>
            </div>
        </div>

        <div id="dialogue-box">
            <div id="speaker-name">Нурс</div>
            <div id="dialogue-text">Текст загружается...</div>
            <div id="choices-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
