<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQ Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- mongodb+srv://nurs_itcodding:<db_password>@eq-game.zyivfpq.mongodb.net/?appName=EQ-game -->
</head>
<body>
    <div id="game-container">
        <div id="name-overlay">
            <div class="name-modal">
                <h2>Enter the player's name</h2>
                <input type="text" id="start-player-name-input" placeholder="For example, Alikhan" maxlength="24">
                <button class="restart-btn" onclick="startGame()">Start game</button>
            </div>
        </div>

        <div id="results-overlay" class="hidden">
            <div class="results-container">
                <h2>Project submitted! EQ results</h2>
                <div id="stats-bars" class="stats-bars"></div>
                <div class="results-grid">
                    <div class="res-col">
                        <h3>Self-Awareness Ranking (AITU)</h3>
                        <div class="leaderboard-section">
                            <h3>Top 10 Self-Aware Students</h3>
                            <div class="leaderboard-header">
                                <span>Rank</span>
                                <span>Name</span>
                                <span>EQ Score</span>
                            </div>
                            <div id="leaderboard-container">
                                <p class="loading-text">Loading data...</p>
                            </div>
                        </div>

                    </div>
                    <div class="res-col">
                        <h3>Tips from students</h3>
                        <div id="comments-display"></div>
                        <div class="comment-input-area">
                            <input type="text" id="player-name-input" placeholder="Name">
                            <textarea id="comment-text-input" placeholder="Your advice..."></textarea>
                            <button class="restart-btn" onclick="handleCommentSubmit()">Leave a note</button>
                        </div>
                    </div>
                </div>
                <div class="results-actions">
                    <button class="restart-btn" onclick="restartGame()">Start a new semester</button>
                </div>
            </div>
        </div>

        <div id="background"></div>
        
        <div id="character-layer">
            <img id="character" src="" alt="Character sprite">
        </div>

        <div id="side-ui">
            <h3>Stats</h3>
            <div class="stat-container">
                <span>Stress</span>
                <div class="bar-bg"><div id="bar-stress" class="bar-fill" style="background: #ff4757;"></div></div>
            </div>
            <div class="stat-container">
                <span>Awareness</span>
                <div class="bar-bg"><div id="bar-awareness" class="bar-fill" style="background: #2ed573;"></div></div>
            </div>
            <div class="stat-container">
                <span>Empathy</span>
                <div class="bar-bg"><div id="bar-empathy" class="bar-fill" style="background: #1e90ff;"></div></div>
            </div>
            <div class="stat-container">
                <span>Motivation</span>
                <div class="bar-bg"><div id="bar-motivation" class="bar-fill" style="background: #ffa502;"></div></div>
            </div>
        </div>

        <div id="dialogue-box">
            <div id="speaker-name">Nurs</div>
            <div id="dialogue-text">Loading text...</div>
            <div id="choices-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
