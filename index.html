<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQ Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- mongodb+srv://nurs_itcodding:<db_password>@eq-game.zyivfpq.mongodb.net/?appName=EQ-game -->
</head>
<body>
    <div id="game-container">
        <div id="name-overlay">
            <div class="name-modal">
                <h2>Введите имя игрока</h2>
                <input type="text" id="start-player-name-input" placeholder="Например, Алихан" maxlength="24">
                <button class="restart-btn" onclick="startGame()">Начать игру</button>
            </div>
        </div>

        <div id="results-overlay" class="hidden">
            <div class="results-container">
                <h2>Проект сдан! Результаты EQ</h2>
                <div id="stats-bars" class="stats-bars"></div>
                <div class="results-grid">
                    <div class="res-col">
                        <h3>Топ осознанных (AITU)</h3>
                        <div class="leaderboard-section">
                            <h3>🏆 Топ-10 осознанных студентов</h3>
                            <div class="leaderboard-header">
                                <span>Место</span>
                                <span>Имя</span>
                                <span>EQ Score</span>
                            </div>
                            <div id="leaderboard-container">
                                <p class="loading-text">Загрузка данных...</p>
                            </div>
                        </div>

                    </div>
                    <div class="res-col">
                        <h3>Советы от студентов</h3>
                        <div id="comments-display"></div>
                        <div class="comment-input-area">
                            <input type="text" id="player-name-input" placeholder="Имя">
                            <textarea id="comment-text-input" placeholder="Твой совет..."></textarea>
                            <button class="restart-btn" onclick="handleCommentSubmit()">Оставить след</button>
                        </div>
                    </div>
                </div>
                <div class="results-actions">
                    <button class="restart-btn" onclick="restartGame()">Начать новый семестр</button>
                </div>
            </div>
        </div>

        <div id="background"></div>
        
        <div id="character-layer">
            <img id="character" src="" alt="Спрайт персонажа">
        </div>

        <div id="side-ui">
            <h3>Состояние</h3>
            <div class="stat-container">
                <span>Stress</span>
                <div class="bar-bg"><div id="bar-stress" class="bar-fill" style="background: #ff4757;"></div></div>
            </div>
            <div class="stat-container">
                <span>Awareness</span>
                <div class="bar-bg"><div id="bar-awareness" class="bar-fill" style="background: #2ed573;"></div></div>
            </div>
            <div class="stat-container">
                <span>Empathy</span>
                <div class="bar-bg"><div id="bar-empathy" class="bar-fill" style="background: #1e90ff;"></div></div>
            </div>
            <div class="stat-container">
                <span>Motivation</span>
                <div class="bar-bg"><div id="bar-motivation" class="bar-fill" style="background: #ffa502;"></div></div>
            </div>
        </div>

        <div id="dialogue-box">
            <div id="speaker-name">Нурс</div>
            <div id="dialogue-text">Текст загружается...</div>
            <div id="choices-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
